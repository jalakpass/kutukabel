<!-- ====================== CRISP SCRIPT (INI YANG BARU) ====================== -->
<script type="text/javascript">
  window.$crisp = [];
  window.CRISP_WEBSITE_ID = "24044333-69ec-4136-9be9-c708911b4468";

  (function(){
    var d = document;
    var s = d.createElement("script");
    s.src = "https://client.crisp.chat/l.js";
    s.async = 1;
    d.getElementsByTagName("head")[0].appendChild(s);
  })();

  function hideCrisp() {
    if (window.$crisp) {
      $crisp.push(["do", "chat:hide"]);
    }
  }

  window.addEventListener('load', function() {
    setTimeout(hideCrisp, 800);
    setTimeout(hideCrisp, 1500);
    setTimeout(hideCrisp, 3000);
    setTimeout(hideCrisp, 5000);
  });

  function openCrispChat() {
    if (window.$crisp) {
      $crisp.push(["do", "chat:show"]);
      $crisp.push(["do", "chat:open"]);
    } else {
      alert("Chat teknisi sedang dimuat. Silakan coba lagi sebentar.");
    }
  }
</script>

<!-- ====================== KUTUBOT AI SCRIPT ====================== -->
<script>
const PROXY_URL = "https://kutubot-proxy.jalakpass.workers.dev";
const SYSTEM_PROMPT = `Kamu adalah KutuBot, asisten teknis AI dari KutuKabel...`; 
// (paste seluruh SYSTEM_PROMPT yang panjang seperti sebelumnya)

let conversationHistory = [];
let eskalasiShown = false;

function getCurrentTime() {
  return new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
}

function addMessage(role, content) {
  const messages = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  div.innerHTML = `<div class="msg-bubble">${content.replace(/\n/g,'<br>')}</div><div class="msg-time">${role==='user'?'Kamu':'KutuBot'} · ${getCurrentTime()}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typingIndicator';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if(t) t.remove();
}

function showEskalasi() {
  if(!eskalasiShown) {
    document.getElementById('eskalasiB').classList.add('show');
    eskalasiShown = true;
  }
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';
  addMessage('user', msg);
  conversationHistory.push({role:'user', content:msg});
  showTyping();

  try {
    const response = await fetch(PROXY_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'llama3-8b-8192',
        messages:[{role:'system',content:SYSTEM_PROMPT},...conversationHistory],
        max_tokens:500,
        temperature:0.7
      })
    });
    const data = await response.json();
    const reply = data.choices[0].message.content;
    removeTyping();
    addMessage('bot', reply);
    conversationHistory.push({role:'assistant', content:reply});

    const eskalasi = ['teknisi','Rp','berbayar','konsultasi','lapangan','cek fisik'];
    if(eskalasi.some(k => reply.toLowerCase().includes(k))) showEskalasi();
    if(conversationHistory.filter(m=>m.role==='user').length >= 3) showEskalasi();
  } catch(e) {
    removeTyping();
    addMessage('bot','Waduh, koneksi ke server lagi gangguan nih. Coba lagi sebentar ya.');
  }
}

document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if(e.key==='Enter') sendMessage();
});
</script>
