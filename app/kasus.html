<body>

<h2 style="text-align:center;">
Kasus Serupa
</h2>

<div
id="relatedCases"
style="
max-width:700px;
margin:auto;
">
Loading...
</div>
  
<script>

const params =
new URLSearchParams(
window.location.search
);

const slug =
params.get("slug");

async function loadCase(){

try{

const res = await fetch(
"https://kutukabel-api.jalakpass.workers.dev/case?slug=" + slug
);

const data = await res.json();

document.getElementById("title").innerText =
data.title || "Tanpa Judul";

document.title =
(data.title || "Kasus") +
" | KutuKabel";

document.getElementById("device").innerText =
data.device || "-";

document.getElementById("client").innerText =
data.client_name || "-";

document
.querySelector(
'meta[name="description"]'
)
.setAttribute(
"content",
(
data.symptom ||
data.title ||
"Database troubleshooting KutuKabel"
)
.substring(0,160)
);

document.getElementById("content").innerText =
data.content || "Belum ada narasi AI";

loadRelated(
data.device,
data.id
);

if(
data.photo_before ||
data.photo_after
){

document.getElementById(
"photos"
).style.display = "block";

if(data.photo_before){

document.getElementById(
"photoBefore"
).src =
"https://kutukabel-api.jalakpass.workers.dev/image?file="
+
encodeURIComponent(
data.photo_before
);

}

document.getElementById(
"photoBeforeLink"
).href =
"https://kutukabel-api.jalakpass.workers.dev/image?file="
+
encodeURIComponent(
data.photo_before
);
  
if(data.photo_after){

document.getElementById(
"photoAfter"
).src =
"https://kutukabel-api.jalakpass.workers.dev/image?file="
+
encodeURIComponent(
data.photo_after
);

}

document.getElementById(
"photoAfterLink"
).href =
"https://kutukabel-api.jalakpass.workers.dev/image?file="
+
encodeURIComponent(
data.photo_after
);
  
}
  
}catch(err){

document.getElementById("content").innerText =
"Gagal memuat data";

}

}

loadCase();

async function loadRelated(device,currentId){

const res = await fetch(
"https://kutukabel-api.jalakpass.workers.dev/cases"
);

const cases = await res.json();

const related =
cases.filter(item =>

String(item.id) !== String(currentId)

&&

(item.device || "")
.toLowerCase() ===
(device || "")
.toLowerCase()

);

const container =
document.getElementById(
"relatedCases"
);

if(related.length === 0){

container.innerHTML =
"Tidak ada kasus serupa";

return;

}

container.innerHTML = "";

related
.slice(0,5)
.forEach(item => {

container.innerHTML += `
<div
style="
padding:15px;
border:1px solid #eee;
margin:0 auto 10px auto;
border-radius:8px;
cursor:pointer;
max-width:700px;
"
onclick="
window.location.href=
'kasus.html?id=${item.id}'
">

<b>${item.title}</b>

<br>

<small>
${item.created_at}
</small>

</div>
`;

});

}
  
</script>

</body>
