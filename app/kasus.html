<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detail Kasus | KutuKabel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
margin-top:0;
margin-bottom:10px;
}

.meta{
color:#666;
margin-bottom:20px;
padding-bottom:20px;
border-bottom:1px solid #eee;
}

.content{
white-space:pre-wrap;
line-height:1.8;
font-size:15px;
}
  
.photos{
margin-top:30px;
padding-top:20px;
border-top:1px solid #eee;
}

.photo-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.photo-box img{
width:100%;
border-radius:10px;
border:1px solid #ddd;
}

.photo-title{
font-weight:bold;
margin-bottom:10px;
}

@media(max-width:768px){

.photo-grid{
grid-template-columns:1fr;
}

}
.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#d46316;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<a href="daftar-kasus.html" class="back">
← Kembali ke Daftar Kasus
</a>

<h1 id="title">
Loading...
</h1>

<div class="meta">

<div>
<b>Perangkat:</b>
<span id="device"></span>
</div>

<div>
<b>Klien:</b>
<span id="client"></span>
</div>

</div>

<div
id="content"
class="content">
Memuat data...
</div>

<div
id="photos"
class="photos"
style="display:none;">

<h2>Dokumentasi Lapangan</h2>

<div class="photo-grid">

<div class="photo-box">
<div class="photo-title">
Before
</div>

<a id="photoBeforeLink" target="_blank">
<img id="photoBefore">
</a>

</div>

<div class="photo-box">
<div class="photo-title">
After
</div>

<a id="photoAfterLink" target="_blank">
<img id="photoAfter">
</a>

</div>

</div>

</div>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const id =
params.get("id");

async function loadCase(){

try{

const res = await fetch(
"https://kutukabel-api.jalakpass.workers.dev/case?id=" + id
);

const data = await res.json();

document.getElementById("title").innerText =
data.title || "Tanpa Judul";

document.getElementById("device").innerText =
data.device || "-";

document.getElementById("client").innerText =
data.client_name || "-";

document.getElementById("content").innerText =
data.content || "Belum ada narasi AI";

if(
data.photo_before ||
data.photo_after
){

document.getElementById(
"photos"
).style.display = "block";

if(data.photo_before){

document.getElementById(
"photoBefore"
).src =
"https://kutukabel-api.jalakpass.workers.dev/image?file="
+
encodeURIComponent(
data.photo_before
);

}

document.getElementById(
"photoBeforeLink"
).href =
"https://kutukabel-api.jalakpass.workers.dev/image?file="
+
encodeURIComponent(
data.photo_before
);
  
if(data.photo_after){

document.getElementById(
"photoAfter"
).src =
"https://kutukabel-api.jalakpass.workers.dev/image?file="
+
encodeURIComponent(
data.photo_after
);

}

document.getElementById(
"photoAfterLink"
).href =
"https://kutukabel-api.jalakpass.workers.dev/image?file="
+
encodeURIComponent(
data.photo_after
);
  
}
  
}catch(err){

document.getElementById("content").innerText =
"Gagal memuat data";

}

}

loadCase();

</script>

</body>
</html>
