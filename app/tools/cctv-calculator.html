<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CCTV HDD Calculator | KutuKabel</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
margin-top:0;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#d46316;
color:white;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:25px;
padding:20px;
background:#fafafa;
border-radius:10px;
display:none;
}

.value{
font-size:20px;
font-weight:bold;
margin-top:5px;
margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>CCTV HDD Calculator</h1>

<label>Jumlah Kamera *</label>
<input type="number" id="camera" min="1">

<label>Resolusi</label>
<select id="resolution">
<option value="2" selected>2MP</option>
<option value="4">4MP</option>
<option value="5">5MP</option>
<option value="8">8MP</option>
<option value="12">12MP</option>
</select>

<label>Codec</label>
<select id="codec">
<option value="h265" selected>H.265</option>
<option value="h264">H.264</option>
</select>

<label>Frame Rate</label>
<select id="fps">
<option value="10">10 FPS</option>
<option value="15">15 FPS</option>
<option value="20">20 FPS</option>
<option value="25" selected>25 FPS</option>
<option value="30">30 FPS</option>
</select>

<label>Kualitas Video</label>
<select id="quality">
<option value="low">Low</option>
<option value="medium" selected>Medium</option>
<option value="high">High</option>
</select>
  
<label>Jam Rekam per Hari</label>
<input type="number" id="hours" value="24">

<label>Hari Penyimpanan</label>
<input type="number" id="days" value="30">

<button onclick="hitung()">HITUNG</button>

<div class="result" id="result"></div>

</div>

<script>

function hitung(){

const camera =
parseInt(document.getElementById("camera").value);

if(!camera){
alert("Jumlah Kamera wajib diisi");
return;
}

const resolution =
parseInt(document.getElementById("resolution").value);

const codec =
document.getElementById("codec").value;

const fps =
parseInt(document.getElementById("fps").value);

const hours =
parseInt(document.getElementById("hours").value);

const days =
parseInt(document.getElementById("days").value);
  
const quality =
document.getElementById("quality").value;

const bitrateTable = {

2:{
low:1.8,
medium:2.5,
high:4.0
},

4:{
low:3.0,
medium:4.5,
high:6.5
},

5:{
low:4.0,
medium:5.5,
high:8.0
},

8:{
low:6.0,
medium:8.0,
high:12.0
},

12:{
low:8.0,
medium:12.0,
high:16.0
}

};

let bitrate =
bitrateTable[resolution][quality];

if(codec === "h264"){
bitrate = bitrate * 1.4;
}

bitrate =
bitrate * (fps / 25);

const totalBitrate =
bitrate * camera;

const totalTB =
(
totalBitrate *
1000000 *
3600 *
hours *
days
)
/
8
/
1000
/
1000
/
1000
/
1000;

const hddSizes =
[1,2,4,6,8,10,12,16,20,24];

let recommend = "Multi HDD";

for(let size of hddSizes){

if(totalTB <= size){

recommend = size + " TB";

break;

}

}

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML = `

<div>
Kebutuhan Storage
<div class="value">
${totalTB.toFixed(2)} TB
</div>
</div>

<div>
Rekomendasi HDD
<div class="value">
${recommend}
</div>
</div>

<div>
Alternatif
<div class="value">

2 × ${Math.ceil(parseInt(recommend)/2)} TB

<br><br>

3 × ${Math.ceil(parseInt(recommend)/3)} TB

</div>
</div>

`;

}

</script>

</body>
</html>
