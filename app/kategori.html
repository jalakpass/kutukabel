<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kategori | KutuKabel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
cursor:pointer;
}

.card:hover{
transform:translateY(-2px);
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.meta{
font-size:13px;
color:#666;
}

.quick-nav{
width:100%;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin:30px auto;
flex-wrap:wrap;
text-align:center;
}

.quick-nav a{
background:#f3f3f3;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
color:#222;
}

.quick-nav a:hover{
background:#e8e8e8;
}

</style>

</head>

<body>
<script>

const params =
new URLSearchParams(
window.location.search
);

const category =
params.get("category") || "";

document.getElementById(
"pageTitle"
).innerText =
category || "Kategori";

document.title =
(category || "Kategori")
+ " | KutuKabel";

async function loadCases(){

const res = await fetch(
"https://kutukabel-api.jalakpass.workers.dev/cases"
);

const data =
await res.json();

const filtered =
data.filter(item =>

(item.category || "")
.toLowerCase() ===
category.toLowerCase()

);

renderCases(filtered);

}

function renderCases(data){

const container =
document.getElementById("cases");

container.innerHTML = "";

document.getElementById(
"resultCount"
).innerHTML =
data.length +
" kasus ditemukan";

if(data.length === 0){

container.innerHTML =
`
<div class="card">
Belum ada kasus pada kategori ini
</div>
`;

return;

}

data.forEach(item => {

container.innerHTML += `
<div
class="card"
onclick="
window.location.href=
'kasus.html?slug=${item.slug}'
">

<div class="title">
${item.title}
</div>

<div class="meta">
Perangkat:
${item.device || "-"}
</div>

</div>
`;

});

}

loadCases();

</script>

<div class="quick-nav">

<a href="/">
Home
</a>

<a href="daftar-kasus.html">
Database
</a>

<a href="/app/tools/">
Tools
</a>

</div>

</body>
<div class="container">

<h1 id="pageTitle">
Kategori
</h1>

<div id="resultCount"></div>

<div id="cases"></div>

</div>
