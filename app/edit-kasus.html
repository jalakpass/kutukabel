<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Kasus | KutuKabel</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
margin:0;
}

.card{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

textarea{
min-height:80px;
}

.btn{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#d46316;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h1>Edit Kasus</h1>

<input id="caseId" type="hidden">

<label>Judul</label>
<input id="title">

<label>Kategori</label>

<select id="category">

<option>CCTV</option>

<option>Access Control</option>

<option>Jaringan</option>

<option>PABX</option>

<option>Alarm</option>

<option>Smart Home</option>
<option>Listrik</option>
<option>Lainnya</option>

</select>

<label>Merk</label>
<input id="brand">

<label>Model</label>
<input id="model">

<label>Perangkat</label>
<input id="device">

<label>Gejala</label>
<textarea id="symptom"></textarea>

<label>Penyebab</label>
<textarea id="cause"></textarea>

<label>Solusi</label>
<textarea id="solution"></textarea>

<label>Tools</label>
<textarea id="tools"></textarea>

<label>Catatan</label>
<textarea id="notes"></textarea>

<label>Klien</label>
<input id="client_name">

<label>Prompt AI</label>

<div style="margin-bottom:10px;">

<button
type="button"
class="btn"
onclick="generatePrompt()">
Generate Prompt AI
</button>

<button
type="button"
class="btn"
onclick="copyPrompt()">
Copy Prompt
</button>

</div>

<textarea id="excerpt"></textarea>

<label>Narasi</label>
<textarea id="content"></textarea>
<button
class="btn"
onclick="updateCase()">
Simpan Perubahan
</button>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const id =
params.get("id");

async function loadCase(){

if(!id){
return;
}

const res =
await fetch(
"https://kutukabel-api.jalakpass.workers.dev/case?slug="
+ id
);

const data =
await res.json();

document.getElementById("caseId").value =
data.id || "";

document.getElementById("title").value =
data.title || "";

document.getElementById("category").value =
data.category || "";

document.getElementById("brand").value =
data.brand || "";

document.getElementById("model").value =
data.model || "";

document.getElementById("device").value =
data.device || "";

document.getElementById("symptom").value =
data.symptom || "";

document.getElementById("cause").value =
data.cause || "";

document.getElementById("solution").value =
data.solution || "";

document.getElementById("tools").value =
data.tools || "";

document.getElementById("notes").value =
data.notes || "";

document.getElementById("client_name").value =
data.client_name || "";

document.getElementById("excerpt").value =
data.excerpt || "";

document.getElementById("content").value =
data.content || "";

}

function generatePrompt(){

const prompt = `Anda adalah teknisi lapangan berpengalaman yang sedang menulis dokumentasi troubleshooting untuk database pengetahuan KutuKabel.

Kategori: ${document.getElementById("category").value}
Merk: ${document.getElementById("brand").value}
Model: ${document.getElementById("model").value}
Perangkat: ${document.getElementById("device").value}
Gejala: ${document.getElementById("symptom").value}
Penyebab: ${document.getElementById("cause").value}
Solusi: ${document.getElementById("solution").value}
Tools: ${document.getElementById("tools").value}

Catatan Teknisi:
${document.getElementById("notes").value}

Buat:

1. Judul Kasus
2. Ringkasan
3. Narasi Troubleshooting
4. Pembelajaran Teknis
5. Kata Kunci`;

document.getElementById(
"excerpt"
).value = prompt;

}

function copyPrompt(){

const prompt =
document.getElementById(
"excerpt"
);

prompt.select();

navigator.clipboard.writeText(
prompt.value
);

alert(
"Prompt berhasil disalin"
);

}

loadCase();

</script>
