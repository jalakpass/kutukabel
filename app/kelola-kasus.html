<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola Kasus | KutuKabel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.btn{
display:inline-block;
padding:8px 12px;
border-radius:6px;
text-decoration:none;
margin-right:8px;
font-size:14px;
}

.edit{
background:#d46316;
color:white;
}

.delete{
background:#cc3333;
color:white;
}

</style>
</head>

<body>
<script>

async function loadCases(){

const res = await fetch(
"https://kutukabel-api.jalakpass.workers.dev/cases"
);

const data =
await res.json();

renderCases(data);

}

function renderCases(data){

const container =
document.getElementById("cases");

container.innerHTML = "";

if(data.length === 0){

container.innerHTML =
"Belum ada kasus";

return;

}

data.forEach(item => {

container.innerHTML += `
<div class="card">

<h3>
${item.title || "-"}
</h3>

<p>
${item.device || "-"}
</p>

<a
class="btn edit"
href="edit-kasus.html?id=${item.id}">
Edit
</a>

<a
class="btn delete"
href="#"
onclick="
hapusKasus(
'${item.id}'
);
return false;
">
Hapus
</a>

</div>
`;

});

}

async function hapusKasus(id){

alert(
"Fitur hapus akan dibuat setelah endpoint delete selesai."
);

}

loadCases();

</script>

</body>
<div class="container">

<h1>Kelola Kasus</h1>

<div id="cases">
Memuat data...
</div>

</div>
