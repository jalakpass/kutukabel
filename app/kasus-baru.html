<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasus Baru | KutuKabel</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;margin:0;}
.card{max-width:900px;margin:auto;background:white;padding:25px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
h1{margin-top:0;}
label{display:block;margin-top:15px;margin-bottom:5px;font-weight:bold;}
input,select,textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;}
textarea{min-height:120px;resize:vertical;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.btn{padding:12px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.btn-ai{background:#d46316;color:white;}
.btn-save{background:#222;color:white;}
.actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
#promptOutput{min-height:250px;}
#content{min-height:400px;}
</style>
</head>
<body>

<div class="card">
<h1>Kasus Baru</h1>

<div class="row">
<div>
<label>Kategori</label>
<select id="category">
<option>CCTV</option>
<option>Access Control</option>
<option>Network</option>
<option>PABX</option>
<option>Alarm</option>
</select>
</div>

<div>
<label>Merk</label>
<input id="brand" type="text">
</div>
</div>

<div class="row">
<div>
<label>Model</label>
<input id="model" type="text">
</div>

<div>
<label>Perangkat</label>
<input id="device" type="text">
</div>
</div>

<label>Gejala</label>
<textarea id="symptom"></textarea>

<label>Penyebab</label>
<textarea id="cause"></textarea>

<label>Solusi</label>
<textarea id="solution"></textarea>

<label>Tools Digunakan</label>
<textarea id="tools"></textarea>

<label>Catatan Teknisi</label>
<textarea id="notes"></textarea>

<label>Nama Klien (Opsional)</label>
<input id="client" type="text">

<label>Upload Foto</label>
<input id="photo" type="file">

<div class="actions">
<button class="btn btn-ai" onclick="generatePrompt()">Generate Prompt AI</button>
<button class="btn btn-ai" onclick="copyPrompt()">Copy Prompt</button>
</div>

<hr>

<h2>Prompt AI</h2>
<textarea id="promptOutput"></textarea>

<hr>

<h2>Narasi AI</h2>
<textarea id="content" placeholder="Paste hasil ChatGPT di sini..."></textarea>

<br><br>

<button class="btn btn-save" onclick="simpanKasus()">Simpan Kasus</button>

</div>

<script>
function generatePrompt(){
const prompt = `
Anda adalah teknisi lapangan berpengalaman yang sedang menulis dokumentasi troubleshooting untuk database pengetahuan KutuKabel.

Kategori: ${document.getElementById('category').value}
Merk: ${document.getElementById('brand').value}
Model: ${document.getElementById('model').value}
Perangkat: ${document.getElementById('device').value}
Gejala: ${document.getElementById('symptom').value}
Penyebab: ${document.getElementById('cause').value}
Solusi: ${document.getElementById('solution').value}
Tools: ${document.getElementById('tools').value}

Catatan Teknisi:
${document.getElementById('notes').value}

Buat:
1. Judul Kasus
2. Ringkasan
3. Narasi Troubleshooting
4. Pembelajaran Teknis
5. Kata Kunci
`;
document.getElementById('promptOutput').value = prompt;
}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("promptOutput").value);
alert("Prompt berhasil disalin");
}

async function simpanKasus(){

const category =
document.getElementById("category").value;

const device =
document.getElementById("device").value.trim();

const category =
document.getElementById("category").value;

const device =
document.getElementById("device").value.trim();

if(!device){

alert("Perangkat wajib diisi");

return;

}

const symptom =
document.getElementById("symptom").value.trim();

if(!symptom){

alert("Gejala wajib diisi");

return;

}

const solution =
document.getElementById("solution").value.trim();

if(!solution){

alert("Solusi wajib diisi");

return;

}

const content =
document.getElementById("content").value.trim();

if(!content){

alert("Narasi AI wajib diisi");

return;

}

try{
const res = await fetch(
"https://kutukabel-api.jalakpass.workers.dev/cases",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
device: document.getElementById("device").value,
symptom: document.getElementById("symptom").value,
solution: document.getElementById("solution").value,
client_name: document.getElementById("client").value,
excerpt: document.getElementById("promptOutput").value,
content: document.getElementById("content").value
})
}
);
const data = await res.json();
alert(data.message || data.error);
}catch(err){
alert("Gagal: " + err.message);
}
}
</script>

</body>
</html>
