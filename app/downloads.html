<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download Center | KutuKabel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
cursor:pointer;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.meta{
font-size:13px;
color:#666;
}

.quick-nav{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}

.quick-nav a{
background:#f3f3f3;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
color:#222;
font-weight:bold;
}

</style>

</head>

<body>

<div id="navbar"></div>

<div class="container">

<h1>Download Center</h1>

<input
id="search"
placeholder="Cari software..."
onkeyup="filterDownloads()">

<select
id="brandFilter"
onchange="filterDownloads()"
style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:20px;">

<option value="">
Semua Brand
</option>

</select>

<div id="resultCount"></div>

<div id="downloads"></div>



</div>

</div>

<script>

fetch(
"/app/components/navigation-public.html"
)
.then(res=>res.text())
.then(html=>{

document.getElementById(
"navbar"
).innerHTML = html;

});

let allDownloads = [];

async function loadDownloads(){

const res = await fetch(
"https://kutukabel-api.jalakpass.workers.dev/downloads"
);

allDownloads =
await res.json();

isiBrandFilter();

renderDownloads(
allDownloads
);

}

function renderDownloads(data){

const container =
document.getElementById(
"downloads"
);

container.innerHTML = "";

document.getElementById(
"resultCount"
).innerHTML =
data.length +
" download ditemukan";

if(data.length === 0){

container.innerHTML =
"<div class='card'>Data tidak ditemukan</div>";

return;

}

data.forEach(item=>{

container.innerHTML += `
<div class="card">

<div class="title">

<a
href="/app/detail-download.html?id=${item.id}"
style="text-decoration:none;color:#222;">

${item.name || "-"}

</a>

</div>



<div class="meta">

<strong>
${item.brand || "-"}
</strong>

<br><br>

${(item.description || "-")
.substring(0,150)}

${(item.description || "")
.length > 150
? "..."
: ""}

</div>

<br>



</div>
`;

});

}

function isiBrandFilter(){

const brands =
[...new Set(
allDownloads
.map(x=>x.brand)
.filter(Boolean)
)]
.sort();

const select =
document.getElementById(
"brandFilter"
);

brands.forEach(brand=>{

select.innerHTML +=
`<option value="${brand}">
${brand}
</option>`;

});

}

function filterDownloads(){

const keyword =
document.getElementById(
"search"
)
.value
.toLowerCase();

const brand =
document.getElementById(
"brandFilter"
)
.value;

const filtered =
allDownloads.filter(item => {

const cocokKeyword =

(item.name || "")
.toLowerCase()
.includes(keyword)

||

(item.brand || "")
.toLowerCase()
.includes(keyword)

||

(item.category || "")
.toLowerCase()
.includes(keyword);

const cocokBrand =

!brand ||
item.brand === brand;

return cocokKeyword &&
cocokBrand;

});

renderDownloads(
filtered
);

}

loadDownloads();

</script>

</body>
</html>
