<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download Baru | KutuKabel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
margin:0;
}

.card{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

textarea{
min-height:80px;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#d46316;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h1>Download Baru</h1>

<label>Kategori *</label>

<select id="category">

<option>CCTV</option>
<option>Access Control</option>
<option>Jaringan</option>
<option>PABX</option>
<option>Alarm</option>
<option>Smart Home</option>

</select>

<label>Brand *</label>
<input id="brand">

<label>Type *</label>

<select id="type">

<option>Software</option>
<option>Mobile App</option>
<option>Manual</option>
<option>Datasheet</option>
<option>Firmware</option>
<option>Tool</option>

</select>

<label>Nama *</label>
<input id="name">

<label>Deskripsi (Optional)</label>
<textarea id="description"></textarea>

<label>Link Vendor *</label>
<input id="url">

<label>Access Type *</label>

<select id="accessType">

<option>Official Page</option>
<option>Direct Download</option>
<option>Agreement Required</option>
<option>Login Required</option>

</select>

<button onclick="simpanDownload()">
Simpan Download
</button>

</div>

<script>

async function simpanDownload(){

const name =
document.getElementById("name").value.trim();

if(!name){

alert("Nama wajib diisi");
return;

}

const url =
document.getElementById("url").value.trim();

if(!url){

alert("Link wajib diisi");
return;

}

const res = await fetch(
"https://kutukabel-api.jalakpass.workers.dev/downloads",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

category:
document.getElementById("category").value,

brand:
document.getElementById("brand").value,

type:
document.getElementById("type").value,

name:name,

description:
document.getElementById("description").value,

url:url,

access_type:
document.getElementById("accessType").value

})
}
);

const data =
await res.json();

if(data.success){

alert("Download berhasil disimpan");

location.reload();

}else{

alert("Gagal menyimpan");

}

}

</script>

</body>
</html>
