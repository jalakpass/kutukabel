<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Detail Download | KutuKabel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.card{
max-width:900px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
margin-top:0;
}

.meta{
color:#666;
margin-bottom:20px;
}

.download-btn{
display:inline-block;
padding:12px 20px;
background:#d46316;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

<h1 id="name">
Loading...
</h1>

<div class="meta">

Brand: <span id="brand"></span>

<br><br>

Kategori: <span id="category"></span>

<br><br>

Type: <span id="type"></span>

<br><br>

Access Type: <span id="accessType"></span>

</div>

<div id="description"></div>

<a
id="downloadBtn"
class="download-btn"
target="_blank">

⬇ Download Here

</a>

</div>

<script>

const id =
new URLSearchParams(
window.location.search
).get("id");

async function loadDownload(){

const res =
await fetch(
"https://kutukabel-api.jalakpass.workers.dev/download?id=" + id
);

const data =
await res.json();

document.getElementById("name").innerText =
data.name || "-";

document.getElementById("brand").innerText =
data.brand || "-";

document.getElementById("category").innerText =
data.category || "-";

document.getElementById("type").innerText =
data.type || "-";

document.getElementById("accessType").innerText =
data.access_type || "-";

document.getElementById("description").innerText =
data.description || "-";

document.getElementById("downloadBtn").href =
data.url || "#";

document.title =
(data.name || "Download")
+ " | KutuKabel";

}

loadDownload();

</script>

</body>
</html>
