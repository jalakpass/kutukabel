<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Kasus | KutuKabel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:20px;
box-sizing:border-box;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
cursor:pointer;
}

.card:hover{
transform:translateY(-2px);
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.meta{
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>Daftar Kasus</h1>

<input
type="text"
id="search"
placeholder="Cari kasus..."
onkeyup="filterCases()">

<div id="cases"></div>

</div>

<script>

let allCases = [];

async function loadCases(){

const res = await fetch(
"https://kutukabel-api.jalakpass.workers.dev/cases"
);

allCases = await res.json();

renderCases(allCases);

}

function renderCases(data){

const container =
document.getElementById("cases");

container.innerHTML = "";

data.forEach(item=>{

container.innerHTML += `
<div class="card"
onclick="openCase('${item.id}')">

<div class="title">
${item.title || item.device}
</div>

<div class="meta">
${item.created_at}
</div>

</div>
`;

});

}

function filterCases(){

const keyword =
document.getElementById("search")
.value
.toLowerCase();

const filtered =
allCases.filter(item =>

(item.title || "")
.toLowerCase()
.includes(keyword)

);

renderCases(filtered);

}

function openCase(id){

window.location.href =
"kasus.html?id=" + id;

}

loadCases();

</script>

</body>
</html>
