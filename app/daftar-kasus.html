<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Kasus | KutuKabel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:20px;
box-sizing:border-box;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
cursor:pointer;
}

.card:hover{
transform:translateY(-2px);
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.meta{
font-size:13px;
color:#666;
}

#categoryFilter button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#f3f3f3;
font-weight:bold;
}

#categoryFilter button:hover{
background:#e8e8e8;
}

.quick-nav{
width:100%;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin:30px auto;
flex-wrap:wrap;
text-align:center;
}

.quick-nav a{
background:#f3f3f3;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
color:#222;
}

.quick-nav a:hover{
background:#e8e8e8;
}

</style>
</head>

<body>

<div class="container">

<h1>Daftar Kasus</h1>

<div style="margin:20px 0;">





<input
id="search"
type="text"
placeholder="Cari kasus..."
oninput="filterCases()"
>
</div>

<div
id="categoryFilter"
style="
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
">

<button onclick="filterCategory('')">Semua</button>

<button onclick="filterCategory('CCTV')">CCTV</button>

<button onclick="filterCategory('Access Control')">Access Control</button>

<button onclick="filterCategory('Jaringan')">Jaringan</button>

<button onclick="filterCategory('PABX')">PABX</button>

<button onclick="filterCategory('Alarm')">Alarm</button>

<button onclick="filterCategory('Smart Home')">Smart Home</button>

</div>

<div id="resultCount"></div>

<div id="cases"></div>
</div>

<script>

let allCases = [];
let activeCategory = "";

async function loadCases(){

const res = await fetch(
"https://kutukabel-api.jalakpass.workers.dev/cases"
);

allCases = await res.json();

renderCases(allCases);

}

function renderCases(data){

const container =
document.getElementById("cases");

container.innerHTML = "";

document.getElementById(
"resultCount"
).innerHTML =
data.length +
" kasus ditemukan";

if(data.length === 0){

container.innerHTML = `
<div class="card">
Kasus tidak ditemukan
</div>
`;

return;

}

data.forEach((item,index)=>{

container.innerHTML += `
<div class="card"
onclick="openCase('${item.slug || item.id}')">

<div class="title">

${index === 0 ? "🆕 " : ""}

${item.title || item.device}

</div>

<div class="meta">

Kategori:
${item.category || "-"}

<br>

Perangkat:
${item.device || "-"}

<br>

Klien:
${item.client_name || "-"}


</div>

</div>
`;

});

}

function filterCases(){

const keyword =
document.getElementById("search")
.value
.toLowerCase();

const filtered =
allCases.filter(item => {

const matchKeyword =

(item.title || "")
.toLowerCase()
.includes(keyword)

||

(item.device || "")
.toLowerCase()
.includes(keyword)

||

(item.client_name || "")
.toLowerCase()
.includes(keyword);

const matchCategory =

!activeCategory ||

(item.category || "")
.toLowerCase() ===
activeCategory.toLowerCase();

return matchKeyword && matchCategory;

});

renderCases(filtered);

}

function filterCategory(category){

activeCategory = category;

filterCases();

}

function openCase(slug){

window.location.href =
"kasus.html?slug=" + slug;

}

loadCases();

</script>

<div class="quick-nav">

<a href="/app/">
Home
</a>

<a href="daftar-kasus.html">
Database
</a>

<a href="/app/tools/">
Tools
</a>

</div>

</body>
</html>
